services:
  banco:
    image: postgres:16
    container_name: atendimento_banco
    restart: always
    environment:
      POSTGRES_USER: atendimento
      POSTGRES_PASSWORD: atendimento123
      POSTGRES_DB: atendimento
    ports:
      - "5432:5432"
    volumes:
      - dados_banco:/var/lib/postgresql/data

volumes:
  dados_banco:
